name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/android/**"
      - "apps/shared/**"

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # setup-android's sdkmanager currently crashes on JDK 21 in CI.
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Let the manual sdkmanager step below accept licenses more reliably.
          accept-android-sdk-licenses: false

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Build debug APK
        working-directory: apps/android
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-debug
          path: apps/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
