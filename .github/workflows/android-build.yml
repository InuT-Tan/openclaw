name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/android/**"
      - "apps/shared/**"

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # setup-android's sdkmanager currently crashes on JDK 21 in CI.
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Let the manual sdkmanager step below accept licenses more reliably.
          accept-android-sdk-licenses: false

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Build debug APK
        working-directory: apps/android
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-debug
          path: apps/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/openclaw-release.jks

      - name: Build release APK
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: apps/android
        run: |
          ./gradlew --no-daemon :app:assembleRelease \
            -POPENCLAW_ANDROID_STORE_FILE=/tmp/openclaw-release.jks \
            -POPENCLAW_ANDROID_STORE_PASSWORD="${{ secrets.ANDROID_STORE_PASSWORD }}" \
            -POPENCLAW_ANDROID_KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -POPENCLAW_ANDROID_KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Upload release APK
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-release
          path: apps/android/app/build/outputs/apk/release/*.apk
          retention-days: 14

      - name: Clean up release keystore
        if: always()
        run: rm -f /tmp/openclaw-release.jks
